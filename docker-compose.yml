version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: smart_attend_db
    restart: always
    environment:
      POSTGRES_DB: smart_attend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
